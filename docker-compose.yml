services:
  tive-bot:
    build: .
    container_name: tive-bot
    restart: always
    env_file:
      - .env
    volumes:
      # SOLO PERSISTENCIA para lo que subes
      - ./servicio/verCertificado:/app/servicio/verCertificado
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
